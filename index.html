<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Voice Memo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }

    body {
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* 全屏可点击区域 */
    .touch-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      cursor: pointer;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      text-align: center;
      pointer-events: none; /* 让点击穿透到 body */
    }

    .wave-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(99, 102, 241, 0.3);
      animation: none;
    }
    .ring:nth-child(1) { width: 100%; height: 100%; }
    .ring:nth-child(2) { width: 75%; height: 75%; }
    .ring:nth-child(3) { width: 50%; height: 50%; border-color: rgba(99, 102, 241, 0.5); }

    .recording .ring { animation: pulse 1.4s ease-in-out infinite; }
    .recording .ring:nth-child(2) { animation-delay: 0.2s; }
    .recording .ring:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%   { transform: scale(1);    opacity: 0.8; border-color: rgba(239, 68, 68, 0.6); }
      100% { transform: scale(1.25); opacity: 0;   border-color: rgba(239, 68, 68, 0); }
    }

    .center-dot {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #6366f1;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .state-recording .center-dot { background: #ef4444; transform: scale(1.1); }
    .state-recorded  .center-dot { background: #10b981; }
    .state-playing   .center-dot { background: #10b981; }

    .center-dot .icon { width: 26px; height: 26px; fill: white; }
    .icon-play { display: none; }

    /* Status pill */
    .status {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 13px;
      letter-spacing: 0.5px;
      transition: all 0.3s;
    }
    .status.recording {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.4);
      color: #fca5a5;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Timer */
    .timer {
      font-size: 30px;
      font-weight: 200;
      color: rgba(255,255,255,0.9);
      font-variant-numeric: tabular-nums;
      letter-spacing: 3px;
    }

    /* Progress bar */
    .progress-bar {
      width: 220px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .progress-bar.visible { opacity: 1; }
    .progress-fill { height: 100%; background: #10b981; width: 0%; transition: width 0.1s linear; }

    /* Hint */
    .hint {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      min-height: 20px;
    }
  </style>
</head>
<body>

<!-- 全屏点击层 -->
<div class="touch-layer" id="touchLayer"></div>

<div class="scene state-idle" id="scene">
  <div class="wave-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="center-dot">
      <svg class="icon icon-mic" id="iconMic" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08C16.39 17.43 19 14.53 19 11h-2z"/>
      </svg>
      <svg class="icon icon-play" id="iconPlay" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </div>
  </div>

  <div class="timer" id="timer">00:00</div>
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="status" id="status">单击开始录音</div>
  <div class="hint" id="hint"></div>
</div>

<script>
  const touchLayer = document.getElementById('touchLayer');
  const scene      = document.getElementById('scene');
  const iconMic    = document.getElementById('iconMic');
  const iconPlay   = document.getElementById('iconPlay');
  const status     = document.getElementById('status');
  const hint       = document.getElementById('hint');
  const timer      = document.getElementById('timer');
  const progBar    = document.getElementById('progressBar');
  const progFill   = document.getElementById('progressFill');

  let state        = 'idle';
  let mediaRecorder = null;
  let audioChunks  = [];
  let audioBlob    = null;
  let audioUrl     = null;
  let audioEl      = null;
  let startTime    = 0;
  let timerInterval = null;
  let lastTap      = 0;
  let tapTimer     = null;

  // ---------- Audio ----------
  async function initAudio() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    audioChunks = [];

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      audioUrl  = URL.createObjectURL(audioBlob);
      stream.getTracks().forEach(t => t.stop());
      clearInterval(timerInterval);
      startPlayback();
    };
    mediaRecorder.start();
  }

  // ---------- State ----------
  function setState(s) {
    state = s;
    scene.className = 'scene state-' + s;

    if (s === 'idle') {
      iconMic.style.display  = 'block';
      iconPlay.style.display = 'none';
      status.textContent = '单击开始录音';
      status.className   = 'status';
      hint.textContent   = '';
      timer.textContent   = '00:00';
      progBar.classList.remove('visible');
      clearInterval(timerInterval);
    }

    if (s === 'recording') {
      iconMic.style.display  = 'block';
      iconPlay.style.display = 'none';
      status.textContent = '录音中...';
      status.className   = 'status recording';
      hint.textContent   = '单击结束';
      startTime = Date.now();
      timerInterval = setInterval(() => {
        timer.textContent = fmtTime(Date.now() - startTime);
      }, 100);
    }

    if (s === 'recorded') {
      iconMic.style.display  = 'none';
      iconPlay.style.display = 'block';
      status.textContent = '已录音';
      status.className   = 'status';
      hint.textContent   = '单击删除重录 · 双击重播';
      progBar.classList.remove('visible');
      clearInterval(timerInterval);
    }

    if (s === 'playing') {
      iconMic.style.display  = 'none';
      iconPlay.style.display = 'block';
      status.textContent = '播放中...';
      status.className   = 'status';
      hint.textContent   = '单击删除重录 · 双击重播';
      progBar.classList.add('visible');
    }
  }

  function fmtTime(ms) {
    ms = Math.max(0, ms);
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    return String(m).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
  }

  // ---------- Playback ----------
  function startPlayback() {
    if (!audioUrl) return;
    stopPlayback();
    audioEl = new Audio(audioUrl);
    progFill.style.width = '0%';
    setState('playing');

    audioEl.onloadedmetadata = () => {
      timer.textContent = fmtTime(audioEl.duration * 1000);
    };
    audioEl.ontimeupdate = () => {
      if (audioEl.duration) {
        progFill.style.width = (audioEl.currentTime / audioEl.duration * 100) + '%';
        timer.textContent = fmtTime(audioEl.currentTime * 1000);
      }
    };
    audioEl.onended = () => {
      progFill.style.width = '0%';
      setState('recorded');
    };
    audioEl.play();
  }

  function stopPlayback() {
    if (audioEl) { audioEl.pause(); audioEl.onended = null; audioEl = null; }
  }

  function deleteAndReset() {
    stopPlayback();
    if (audioUrl) URL.revokeObjectURL(audioUrl);
    audioBlob = null; audioUrl = null;
    clearInterval(timerInterval);
    timer.textContent = '00:00';
    setState('idle');
  }

  // ---------- Touch ----------
  touchLayer.addEventListener('pointerdown', e => {
    e.preventDefault();
    const now = Date.now();

    if (now - lastTap < 300) {
      clearTimeout(tapTimer);
      lastTap = 0;
      handleDoubleTap();
    } else {
      lastTap = now;
      tapTimer = setTimeout(() => {
        lastTap = 0;
        handleSingleTap();
      }, 320);
    }
  });

  function handleSingleTap() {
    if (state === 'idle') {
      initAudio().then(() => setState('recording')).catch(err => {
        alert('请允许麦克风权限: ' + err.message);
        setState('idle');
      });
    } else if (state === 'recording') {
      mediaRecorder.stop();
    } else if (state === 'playing' || state === 'recorded') {
      deleteAndReset();
      initAudio().then(() => setState('recording')).catch(err => {
        alert('请允许麦克风权限: ' + err.message);
        setState('idle');
      });
    }
  }

  function handleDoubleTap() {
    if (state === 'recorded' || state === 'playing') {
      stopPlayback();
      startPlayback();
    }
  }
</script>

</body>
</html>
